[tox]
minversion = 3.23.0
isolated_build = True
envlist = py{311,312,313}-django{52}-pyjwt{2}


[gh-actions]
python =
    3.11: py311
    3.12: py312
    3.13: py313

[testenv]
extras = cryptography
allowlist_externals = pytest
deps =
    django52: django>=5.2,<6.0
    pyjwt2: pyjwt<3
commands =
    pytest -v --ds demo.settings tests
