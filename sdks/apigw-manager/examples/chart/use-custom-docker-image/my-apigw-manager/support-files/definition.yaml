spec_version: 2

release:
  # 发布版本号
  version: 1.0.0
  title: "这是一个测试"
  comment: "这是一个测试"

apigateway:
  description: "这是一个测试"
  description_en: "This is a test"
  is_public: false
  maintainers:
    - "admin"

stages:
  - name: "prod"
    description: "这是一个测试"
    description_en: "This is a test"
    backends:
      - name: "default"
        config:
          timeout: 60
          loadbalance: "roundrobin"
          hosts:
          # 网关调用后端服务的默认域名或IP，不包含Path，比如：http://api.example.com
           - host: "https://httpbin.org"
             weight: 100

    # 同步 MCP Server 相关配置（可选）
    # mcp_servers:
    #   - name: "mcp_server1"
    #     # MCP Server 中文名/显示名称
    #     title: "MCP Server 示例"
    #     description: "mcp-server demo"
    #     labels:
    #       - "test"
    #     # 添加的 tool 对应的资源名称
    #     resource_names:
    #       - resource1
    #     # 是否公开
    #     is_public: true
    #     # 1: 开启, 0: 停止; 默认是开启
    #     status: 1
    #     # MCP 协议类型: sse（默认）、streamable_http
    #     protocol_type: "sse"
    #     # 授权的应用
    #     target_app_codes:
    #       - "bk_app_code1"

    # 环境插件配置
    # plugin_configs:
    #     - type: bk-rate-limit
    #       yaml: |-
    #         rates:
    #           __default:
    #           - period: 1
    #             tokens: 100
    #     - type: bk-header-rewrite
    #       yaml: |-
    #         set:
    #           - key: test
    #             value: '2'
    #         remove: []
    #     - type: bk-cors
    #       yaml: |-
    #         allow_origins: '*'
    #         allow_methods: '*'
    #         allow_headers: '*'
    #         expose_headers: '*'
    #         max_age: 86400
    #         allow_credential: false

# 资源文档
# 资源文档的目录格式样例如下，en 为英文文档，zh 为中文文档：
# ./
# - en
#   - anything.md
# - zh
#   - anything.md
resource_docs:
  basedir: "/data/apidocs/"

# 主动授权，网关主动给应用，添加访问网关所有资源的权限
grant_permissions:
  - bk_app_code: "{{ environ.BK_APP_CODE }}"
    grant_dimension: "gateway"
